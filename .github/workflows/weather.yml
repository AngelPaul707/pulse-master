name: Pulse - Daily Summary Bot

on:
  schedule:
    # 8:00 AM IST translates to 2:30 AM UTC (GitHub servers operate strictly on UTC)
    # Cron format order: Minute Hour Day-of-Month Month Day-of-Week
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows us to trigger the bot manually via a button for instant testing

jobs:
  run-pulse:
    runs-on: ubuntu-latest # Launches a fresh, temporary Linux environment
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Clones your repository files onto the runner
        
      - name: Set up Python
        uses: actions/setup-python@v5 # Sets up a stable environment
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pulse Bot
        run: python bot.py
        
      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4 # Saves the generated file as a downloadable zip package
        with:
          name: daily-summary
          path: daily_summary.txt
